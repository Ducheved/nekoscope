name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - nekoscope-v*

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: release ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-aarch64
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-latest
            platform: macos-x64
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: ubuntu-22.04
            platform: linux-x64
            target: ""
            args: ""
          - os: windows-latest
            platform: windows-x64
            target: ""
            args: ""
    steps:
      - uses: actions/checkout@v6
      - if: runner.os == 'Linux'
        run: sudo apt-get update
      - if: runner.os == 'Linux'
        run: sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          version: 11.6.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: NekoScope ${{ github.ref_name }}
          releaseBody: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' && 'Signed release artifacts.' || 'Unsigned artifacts. Configure Tauri signing secrets before publishing a ready release.' }}
          releaseDraft: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY == '' }}
          prerelease: false
          args: ${{ matrix.args }}
      - name: Package Windows portable app
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $archive = "NekoScope_${{ github.ref_name }}_windows-x64-portable.zip"
          Compress-Archive -LiteralPath "src-tauri\target\release\nekoscope.exe" -DestinationPath $archive -Force
          gh release upload "${{ github.ref_name }}" $archive --clobber
