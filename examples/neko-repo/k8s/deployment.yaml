apiVersion: apps/v1
kind: Deployment
metadata:
  name: nekoscope
  namespace: docs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nekoscope
  template:
    metadata:
      labels:
        app: nekoscope
    spec:
      containers:
        - name: app
          image: ghcr.io/nekoscope/nekoscope:0.1.0
          ports:
            - containerPort: 1420
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
